<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard</title>

    <link rel="stylesheet" href="src/styles/vars.css">
    <link rel="stylesheet" href="src/styles/reset.css">
    <link rel="stylesheet" href="src/styles/index.css">

    <script type="module" src="src/js/main.js" defer></script>
    <script type="module" src="src/js/objects/driver.js" defer></script>
    <script type="module" src="src/js/objects/startinggrid.js" defer></script>
    <script type="module" src="src/js/utils/calls.js" defer></script>
</head>
<body>
    <div class="container">
        <figure class="f1-logo">
            <img src="src/images/f1_old_logo.png" alt="Old F1 logo">
        </figure>

        <header>
            <h1 class="title">F1 Sessions Replay</h1>
        </header>

        <nav>
            <a href=".">Races</a>
            <a href=".">Qualy</a>
            <a href=".">Free Pratice</a>
        </nav>

        <main>
            <table class="table-drivers">
                <thead>
                    <tr>
                        <th>Position</th>
                        <th>Driver</th>
                        <th>Number</th>
                        <th>Team</th>
                    </tr>
                </thead>

                <tbody>

                </tbody>
            </table>
            
            <div class="meeting">
                <figure class="country-image">
                    <img src="" alt="">
                </figure>

                <p class="country"></p>
                <p class="name"></p>
                <p class="year"></p>
                <p class="circuit"></p>
            </div>
        </main>

        <footer>
            
        </footer>
    </div>
</body>
</html>
